name: Binding report
description: Report an issue with a bound Hadar Framework payload.
title: 'binding report: '
labels: ['binding error']
body:
  - type: markdown
    attributes:
      value: |
        # Hadar Framework Binding Report

        Before creating a new binding report, please keep the following in mind:

        - **Do not submit a duplicate binding report**: You can review existing binding reports to check if your issue already exists.
        - **Review the Issue Rules**: Make sure your binding report adheres to the guidelines.
  - type: checkboxes
    id: payloadOptions
    attributes:
      label: Payload Options
      options:
        - label: Activity-method bound payload
        - label: Boot-method bound payload
    validations:
      required: true
  - type: textarea
    attributes:
      label: binding issue description 
      description: |
        - Describe your server issue in detail
        - Add steps to reproduce the server issue if possible (Step 1. ... Step 2. ...)
        - Add images and videos if possible
  - type: textarea
    attributes:
      label: Error logs
      description: If applicable, please post the error logs that are generated.
      render: shell
  - type: textarea
    attributes:
      label: Solution
      description: If applicable, add a possible solution to the binding issue.
  - type: textarea
    attributes:
      label: Additional context
      description: Add additional context here.
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your binding report will be closed if you don't follow the checklist below.
      options:
        - label: This issue is not a duplicate of an existing binding report.
          required: true
        - label: I have chosen an appropriate title.
          required: true
        - label: All requested information has been provided properly.
          required: true
