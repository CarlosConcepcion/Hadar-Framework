<!DOCTYPE html>
<html ng-app="myappy" class="nopadding">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Hadar Framework</title>

    <script>
        if (typeof module === 'object') { window.module = module; module = undefined; }
    </script>

    <script src="assets/js/lib/jquery-3.1.1.min.js"></script>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="assets/js/controllers/NotifiCtrl.js"></script>

    <script>
        if (window.module) module = window.module;
    </script>

    <link rel="stylesheet" href="assets/css/mystyle.css">
    <link rel="stylesheet" href="../node_modules/fomantic-ui/dist/semantic.min.css" />

    <style>
        body { background: transparent !important; }
    </style>

</head>

<body ng-controller="NotifiCtrl" class="nopadding" style="background:transparent;">
    <audio autoplay>
        <source src="Audio/Hadar-notification.mp3" type="audio/mpeg">
    </audio>

    <div class="ui card notification-card">
        <div class="content">
            <span class="right floated">
                <i ng-if="victimCountry != null" class="{{victimCountry}} flag"></i>
                <i ng-if="victimCountry == null" class="help circle icon" style="color:var(--text-muted);"></i>
            </span>
            <div class="header" ng-bind="victimModel"></div>
            <div class="meta" ng-bind="victimSocket"></div>
        </div>
    </div>

</body>

</html>
