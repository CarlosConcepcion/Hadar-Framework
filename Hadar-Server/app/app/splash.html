<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />

    <title>Hadar Framework</title>


    <style>
        html {
            background: #0a0a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a1a;
        }

        .splash-img {
            max-width: 70%;
            max-height: 70%;
            opacity: 0.9;
        }

        .version-text {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #666;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
    </style>


</head>

<body>
    <audio autoplay>
        <source src="Audio/Hadar-bootsplash.mp3" type="audio/mpeg">
    </audio>

    <img class="splash-img" src="assets/img/splash.png" alt="Hadar Framework">
    <div class="version-text">v1.0-beta.5</div>
</body>

</html>
